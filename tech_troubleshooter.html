<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Troubleshooter</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1rem}
  .app{max-width:580px;margin:0 auto;padding:1.5rem 1rem}
  h1{font-size:22px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666;margin-bottom:1.5rem}
  .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
  .cat-card{background:#fff;border:1px solid #e0e0db;border-radius:12px;padding:1rem;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;width:100%}
  .cat-card:hover{background:#f5f5f3;border-color:#bbb}
  .cat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  .cat-title{font-size:14px;font-weight:500}
  .cat-sub{font-size:12px;color:#888;margin-top:3px}
  .issue-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
  .issue-btn{background:#fff;border:1px solid #e0e0db;border-radius:8px;padding:11px 14px;cursor:pointer;text-align:left;font-size:14px;font-family:inherit;display:flex;align-items:center;gap:10px;width:100%;color:#1a1a1a}
  .issue-btn:hover{background:#f5f5f3;border-color:#bbb}
  .issue-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .step-card{background:#fff;border:1px solid #e0e0db;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;transition:opacity .2s}
  .step-card.done{opacity:.5}
  .step-header{display:flex;align-items:flex-start;gap:12px}
  .step-num{width:24px;height:24px;border-radius:50%;background:#f0f0ec;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#666;flex-shrink:0;margin-top:1px}
  .step-num.done-num{background:#e6f4ea;border-color:#a8d5b0;color:#2d7a3a}
  .step-title{font-size:14px;font-weight:500;margin-bottom:4px}
  .step-desc{font-size:13px;color:#555;line-height:1.6}
  .step-actions{display:flex;gap:8px;margin-top:12px;margin-left:36px}
  .btn-done{padding:6px 14px;border-radius:8px;border:1px solid #a8d5b0;background:#e6f4ea;color:#2d7a3a;font-size:13px;cursor:pointer;font-family:inherit}
  .btn-skip{padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#888;font-size:13px;cursor:pointer;font-family:inherit}
  .btn-done:hover,.btn-skip:hover{opacity:.8}
  .progress-bar-wrap{background:#e8e8e4;border-radius:99px;height:4px;margin-bottom:1.5rem;overflow:hidden}
  .progress-bar-fill{height:4px;border-radius:99px;background:#1D9E75;transition:width .3s}
  .back-btn{background:transparent;border:none;color:#888;font-size:13px;cursor:pointer;padding:0;margin-bottom:1rem;font-family:inherit;display:flex;align-items:center;gap:6px}
  .back-btn:hover{color:#1a1a1a}
  .section-label{font-size:11px;font-weight:500;color:#aaa;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
  .resolved-box{background:#e6f4ea;border:1px solid #a8d5b0;border-radius:12px;padding:1.25rem;text-align:center;margin-top:1rem}
  .resolved-box p{font-size:14px;color:#2d7a3a;font-weight:500}
  .resolved-box span{font-size:13px;color:#2d7a3a;opacity:.8}
  .footer-note{margin-top:1.5rem;padding:12px 14px;background:#fff;border:1px solid #e0e0db;border-radius:8px;font-size:12px;color:#888;text-align:center}
  @media(max-width:400px){.cat-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app"></div>

let view='home', selCat=null, selIssue=null, stepStates={};

function render(){
  const app=document.getElementById('app');
  if(view==='home') renderHome(app);
  else if(view==='issues') renderIssues(app);
  else renderSteps(app);
}

function renderHome(app){
  let h=`<h1>Tech troubleshooter</h1><p class="subtitle">Pick a category to get step-by-step fixes</p><div class="cat-grid">`;
  for(const[k,c] of Object.entries(data)){
    h+=`<button class="cat-card" onclick="selCatFn('${k}')"><div class="cat-icon" style="background:${c.color}">${icons[k]}</div><div class="cat-title">${c.label}</div><div class="cat-sub">${c.issues.length} common issues</div></button>`;
  }
  h+=`</div><div class="footer-note">Works offline &bull; No account needed &bull; Free to use</div>`;
  app.innerHTML=h;
}

function renderIssues(app){
  const c=data[selCat];
  let h=`<button class="back-btn" onclick="goHome()">&#8592; back</button><div class="section-label">${c.label}</div><p style="font-size:14px;color:#555;margin-bottom:1rem">What's the problem?</p><div class="issue-list">`;
  for(const issue of c.issues){
    h+=`<button class="issue-btn" onclick="selIssueFn('${issue.id}')"><div class="issue-dot" style="background:${issue.dot}"></div><span>${issue.label}</span><span style="margin-left:auto;color:#aaa;font-size:13px">${issue.steps.length} steps ›</span></button>`;
  }
  app.innerHTML=h+`</div>`;
}

function renderSteps(app){
  const c=data[selCat];
  const issue=c.issues.find(i=>i.id===selIssue);
  const total=issue.steps.length;
  const done=issue.steps.filter((_,i)=>stepStates[selIssue+'-'+i]).length;
  const pct=Math.round((done/total)*100);
  let h=`<button class="back-btn" onclick="goIssues()">&#8592; ${c.label}</button>`;
  h+=`<p style="font-size:16px;font-weight:500;margin-bottom:4px">${issue.label}</p>`;
  h+=`<p style="font-size:12px;color:#aaa;margin-bottom:14px">Step ${Math.min(done+1,total)} of ${total} &nbsp;·&nbsp; ${pct}% complete</p>`;
  h+=`<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
  if(done===total){
    h+=`<div class="resolved-box"><p>All steps completed!</p><span>Hopefully that fixed it!</span></div>`;
  } else {
    for(let i=0;i<issue.steps.length;i++){
      const s=issue.steps[i];
      const isDone=!!stepStates[selIssue+'-'+i];
      h+=`<div class="step-card${isDone?' done':''}"><div class="step-header"><div class="step-num${isDone?' done-num':''}">${isDone?'✓':(i+1)}</div><div style="flex:1"><div class="step-title">${s.t}</div><div class="step-desc">${s.d}</div></div></div>${!isDone?`<div class="step-actions"><button class="btn-done" onclick="markDone(${i})">Done ✓</button><button class="btn-skip" onclick="markDone(${i})">Skip</button></div>`:''}</div>`;
    }
  }
  app.innerHTML=h;
}

function selCatFn(k){selCat=k;view='issues';render();}
function selIssueFn(id){selIssue=id;view='steps';render();}
function goHome(){view='home';render();}
function goIssues(){view='issues';render();}
function markDone(i){stepStates[selIssue+'-'+i]=true;render();}

render();
</script>
</body>
</html>
